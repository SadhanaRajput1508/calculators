<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
  <input type="text" id="display" disabled>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">Clear</button>
    <br>
    <button  class="line"  onclick="appendValue('7')">7</button>
    <button class="line" onclick="appendValue('8')">8</button>
    <button class="line" onclick="appendValue('9')">9</button>
    <button class="line" onclick="appendValue('/')">/</button>
<br>
    <button onclick="appendValue('4')">4</button>
    <button onclick="appendValue('5')">5</button>
    <button onclick="appendValue('6')">6</button>
    <button onclick="appendValue('*')">*</button>
    <br>

    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
    <button onclick="appendValue('3')">3</button>
    <button onclick="appendValue('-')">-</button>
    <br>

    <button onclick="appendValue('0')">0</button>
    <button class="equal" onclick="calculate()">=</button>
    <button onclick="appendValue('+')">+</button>
    <button onclick="appendValue('.')">.</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
